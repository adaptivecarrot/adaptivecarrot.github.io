name: Build Markdown

on:
  push:
    paths:
      - "notes/*.md"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Pandoc
        run: |
          sudo apt update
          sudo apt install -y pandoc

      - name: Convert Markdown to HTML
        run: |
          for file in notes/*.md
          do
            pandoc \
            --standalone \
            --css=../styles.css \
            --metadata title="$(basename "${file%.md}")" \
            "$file" \
            -o "${file%.md}.html"
          done

      - name: Wrap content in main element
        run: |
          python3 - <<'PY'
          import re, glob
          for file in glob.glob("notes/*.html"):
              with open(file, "r", encoding="utf-8") as f:
                  content = f.read()
              # Wrap body content in <main>
              content = re.sub(r'(<body>)', r'\1\n<main>', content)
              content = re.sub(r'(</body>)', r'</main>\n\1', content)
              with open(file, "w", encoding="utf-8") as f:
                  f.write(content)
          PY

      - name: Commit generated HTML
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add notes/*.html

          if git diff --cached --quiet
          then
            echo "No changes."
          else
            git commit -m "Generate HTML"
            git push
          fi
