name: Build Markdown

on:
  push:
    paths:
      - "notes/*.md"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Pandoc
        run: |
          sudo apt update
          sudo apt install -y pandoc

      - name: Convert Markdown to HTML
        run: |
          for file in notes/*.md
          do
            pandoc \
            --standalone \
            --css=../style.css \
            --metadata title="$(basename "${file%.md}")" \
            "$file" \
            -o "${file%.md}.html"
          done

      - name: Commit generated HTML
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add notes/*.html

          if git diff --cached --quiet
          then
            echo "No changes."
          else
            git commit -m "Generate HTML"
            git push
          fi
